<!DOCTYPE html>
<html>
<head>
    <title>Bone Fracture Classifier</title>
</head>
<body>

<h2>🦴 Bone Fracture Classification</h2>

<form action="/predict" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">预测</button>
</form>

{% if prediction %}
    <h3>预测结果：</h3>
    <ul>
        {% for p in prediction %}
            <li>{{ p }}</li>
        {% endfor %}
    </ul>
{% endif %}

</body>
</html>
